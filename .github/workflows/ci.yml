name: Flutter CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    permissions:
      contents: write
    name: Build & Release
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-bump version
        id: bump
        shell: powershell
        run: |
          $json = Get-Content version.json -Raw | ConvertFrom-Json
          $parts = $json.latestVersion -split '\.'
          $patch = [int]$parts[2] + 1
          $newVersion = "$($parts[0]).$($parts[1]).$patch"
          $newBuild = $json.latestBuildNumber + 1

          Write-Output "Bumping from v$($json.latestVersion) (build $($json.latestBuildNumber)) to v$newVersion (build $newBuild)"

          # Update version.json
          $json.latestVersion = $newVersion
          $json.latestBuildNumber = $newBuild
          $json | ConvertTo-Json -Depth 10 | Set-Content version.json

          # Update assets/version.json
          $json | ConvertTo-Json -Depth 10 | Set-Content assets/version.json

          # Update pubspec.yaml
          $pubspec = Get-Content pubspec.yaml -Raw
          $pubspec = $pubspec -replace '(?<=^version: ).+', "$newVersion+$newBuild"
          $pubspec | Set-Content pubspec.yaml

          "newVersion=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "newBuild=$newBuild" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release

      - name: Zip the build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pharmacy-wms-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.newVersion }}
          name: v${{ steps.bump.outputs.newVersion }}
          files: pharmacy-wms-windows.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json assets/version.json pubspec.yaml
          git diff --cached --quiet && Write-Output "Nothing to commit" && exit 0
          git commit -m "Auto-bump to v${{ steps.bump.outputs.newVersion }} [skip ci]"
          git pull --rebase origin main
          git push
